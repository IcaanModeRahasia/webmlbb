    }

      border-radius: 40px;
      border: 1px solid #3a445a;
      font-size: 0.75rem;
      color: #bcc3d4;
    }

    .mockup-grid {

    }

    }

      border-radius: 12px;
    }
    .mockup-grid::-webkit-scrollbar-thumb {

    }

            <span class="hero-name">${heroName}</span>
            <span class="skin-name">${skinName}</span>
          </div>
          <span class="badge-skin">#${index+1}</span>
        `;
        heroGrid.appendChild(div);
      });
    }

    heroInput.addEventListener('input', function() {
      const val = this.value.trim().toLowerCase();
      suggestionBox.innerHTML = '';
      if (!val) {
        suggestionBox.style.display = 'none';
        return;
      }

      const uniqueHeroes = [...new Set(allSkins.map(s => s.hero))];
      const matches = uniqueHeroes.filter(h => h.toLowerCase().includes(val)).slice(0, 6);

      if (matches.length > 0) {
        matches.forEach(hero => {
          const item = document.createElement('div');
          item.textContent = hero;
          item.style.padding = '10px 16px';
          item.style.cursor = 'pointer';
          item.style.color = '#f0e3cc';
          item.style.borderBottom = '1px solid #232b3b';
          
          item.addEventListener('mouseenter', () => item.style.background = '#222d3d');
          item.addEventListener('mouseleave', () => item.style.background = 'transparent');
          
          item.addEventListener('click', () => {
            heroInput.value = hero;
            suggestionBox.style.display = 'none';
            updateSkinSuggestions(hero);
          });
          suggestionBox.appendChild(item);
        });
        suggestionBox.style.display = 'block';
      } else {
        suggestionBox.style.display = 'none';
      }
    });

    function updateSkinSuggestions(heroName) {
      skinDatalist.innerHTML = '';
      const filteredSkins = allSkins.filter(s => s.hero.toLowerCase() === heroName.toLowerCase());
      filteredSkins.forEach(s => {
        const option = document.createElement('option');
        option.value = s.skin;
        skinDatalist.appendChild(option);
      });
      if (filteredSkins.length > 0) {
        skinInput.value = filteredSkins[0].skin;
      }
    }

    document.addEventListener('click', function(e) {
      if (e.target !== heroInput && e.target !== suggestionBox) {
        suggestionBox.style.display = 'none';
      }
    });

    function initDefaultHeroes() {
      currentHeroes = allSkins.slice(0, 10);
      renderHeroes(currentHeroes);
    }
    initDefaultHeroes();

    fileInput.addEventListener('change', function() {
      if (this.files && this.files.length > 0) {
        const fileName = this.files[0].name;
        const shortName = fileName.length > 28 ? fileName.substring(0, 24) + '…' : fileName;
        fileDisplay.textContent = shortName;
        fileBadge.textContent = '📎 ' + shortName;
      }
    });

    function addHeroFromInput() {
      const heroVal = heroInput.value.trim();
      const skinVal = skinInput.value.trim();
      if (!heroVal || !skinVal) {
        alert('⚠️ Masukkan Nama Hero dan Skin terlebih dahulu!');
        return false;
      }

      currentHeroes.push({ hero: heroVal, skin: skinVal });
      renderHeroes(currentHeroes);

      heroInput.value = '';
      skinInput.value = '';
      heroInput.placeholder = 'Ketik Hero lain...';
      skinInput.placeholder = 'Pilih Skin lain...';
      return true;
    }

    generateBtn.addEventListener('click', function() {
      const heroVal = heroInput.value.trim();
      const skinVal = skinInput.value.trim();
      if (heroVal && skinVal) {
        addHeroFromInput();
      }

      while (currentHeroes.length < 10) {
        const idx = currentHeroes.length;
        const randomSkin = allSkins[idx % allSkins.length];
        currentHeroes.push({ 
          hero: randomSkin.hero, 
          skin: randomSkin.skin 
        });
      }
      renderHeroes(currentHeroes);

      let imageUrl = '';
      if (fileInput.files && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          imageUrl = e.target.result;
          resultImage.src = imageUrl;
          resultHD.classList.add('show');
          resultHD.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };
        reader.readAsDataURL(file);
      } else {
        const canvas = document.createElement('canvas');
        canvas.width = 950;
        canvas.height = 600;
        const ctx = canvas.getContext('2d');

        const grd = ctx.createRadialGradient(475, 300, 50, 475, 300, 650);
        grd.addColorStop(0, '#2a3348');
        grd.addColorStop(0.6, '#141b27');
        grd.addColorStop(1, '#070a10');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.shadowColor = '#f5c54235';
        ctx.shadowBlur = 35;
        ctx.strokeStyle = '#f5c54245';
        ctx.lineWidth = 2;
        ctx.strokeRect(20, 20, canvas.width-40, canvas.height-40);
        ctx.shadowBlur = 0;

        ctx.font = 'bold 38px Segoe UI, Roboto, sans-serif';
        ctx.fillStyle = '#f5d68a';
        ctx.fillText('⚡ EDIT SPEK MLBB × icaanz', 60, 90);

        ctx.font = '18px Segoe UI, sans-serif';
        ctx.fillStyle = '#b7aa88';
        ctx.fillText('📸 ' + currentHeroes.length + ' Total Mastered Skins Database', 60, 130);

        ctx.font = '500 16px Segoe UI, sans-serif';
        let yPos = 185;
        const maxShow = Math.min(currentHeroes.length, 14);
        for (let i = 0; i < maxShow; i++) {
          const h = currentHeroes[i];
          ctx.fillStyle = i % 2 === 0 ? '#f0e3cc' : '#d4c8ac';
          const label = `${i+1}. ${h.hero}  —  [ ${h.skin} ]`;
          ctx.fillText(label, 60, yPos);
          yPos += 30;
        }

        ctx.font = '13px monospace';
        ctx.fillStyle = '#7a8296';
        ctx.fillText('🔑 ID Lisensi: IcaanzMlbb02838  |  Kontak: wa.me/6283199265399', 60, canvas.height-35);

        imageUrl = canvas.toDataURL('image/png');
        resultImage.src = imageUrl;
        resultHD.classList.add('show');
        resultHD.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });

    heroInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addHeroFromInput();
      }
    });
  })();
</script>
</body>
</html>
